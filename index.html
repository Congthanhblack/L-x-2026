<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vòng Quay Lì Xì 2026</title>
<style>
body{
    text-align:center;
    background: radial-gradient(circle,#fff4d6,#ffcccc);
    font-family:sans-serif;
}

#wheel{
    width:420px;
    height:420px;
    margin:20px auto;
    border-radius:50%;
    border:10px solid #b30000;
    position:relative;
    overflow:hidden;
}

.segment{
    position:absolute;
    width:50%;
    height:50%;
    transform-origin:100% 100%;
    text-align:center;
    line-height:60px;
    font-weight:bold;
    font-size:14px;
    color:white;
}

#pointer{
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-bottom:80px solid #ff0000;
    margin:auto;
    position:relative;
    top:15px;
    z-index:10;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:5px;
}

#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>🧧 Vòng Quay Lì Xì 2026 🧧</h2>

<div id="pointer"></div>
<div id="wheel"></div>

<button onclick="spin()">Quay Ngay 🎉</button>
<button onclick="reset()">Reset 🔁</button>

<div id="result"></div>

<audio id="spinSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>

let resetCount = 0;
let force100k = false;

const prizes = [
    "10k","10k","10k",
    "20k","20k",
    "50k","50k",
    "200k (ảo)",
    "100k",
    "Chúc mừng năm mới",
    "An khang thịnh vượng",
    "Lì xì lại gia chủ",
    "Chúc lì xì lại gia chủ",
    "Lộc phát đầu năm",
    "Tết vui vẻ"
];

const wheel = document.getElementById("wheel");

function createWheel(){
    wheel.innerHTML="";
    const angle = 360/prizes.length;

    prizes.forEach((prize,i)=>{
        const div = document.createElement("div");
        div.className="segment";
        div.style.transform=`rotate(${i*angle}deg) skewY(${90-angle}deg)`;
        div.style.background = getColor(prize);
        div.innerHTML=`<div style="transform:skewY(-${90-angle}deg) rotate(${angle/2}deg);">${prize}</div>`;
        wheel.appendChild(div);
    });
}

function getColor(prize){
    if(prize.includes("200")) return "#550000";
    if(prize.includes("100")) return "#990000";
    if(prize.includes("50")) return "#cc3300";
    if(prize.includes("20")) return "#ff6600";
    if(prize.includes("10")) return "#ff9933";
    if(prize.includes("Lì xì")) return "#cc0000";
    return "#ffcc00";
}

createWheel();

function getRandomPrize(){

    if(force100k){
        force100k=false;
        resetCount=0;
        return "100k";
    }

    let rand = Math.random()*100;

    // reset 3 lần -> buff lì xì lại
    if(resetCount===3){
        if(rand<50) return "10k";
        if(rand<70) return "20k";
        if(rand<75) return "50k";
        if(rand<95) return "Lì xì lại gia chủ";
        return "Chúc mừng năm mới";
    }

    // xác suất bình thường
    if(rand<65) return "10k";         // 65%
    if(rand<85) return "20k";         // 20%
    if(rand<90) return "50k";         // 5%
    if(rand<95) return "Lì xì lại gia chủ"; // 5%
    return "Chúc mừng năm mới";       // 5%
}

function spin(){
    let prize = getRandomPrize();
    let index = prizes.indexOf(prize);
    if(index<0) index=0;

    let angle = 360/prizes.length;
    let rotateTo = 360*5 + (360 - index*angle - angle/2);

    document.getElementById("spinSound").play();

    wheel.style.transition="transform 5s cubic-bezier(0.25,0.1,0.25,1)";
    wheel.style.transform=`rotate(${rotateTo}deg)`;

    setTimeout(()=>{
        showResult(prize);
    },5000);
}

function showResult(prize){
    let msg="";

    switch(prize){
        case "10k": msg="😆 Có còn hơn không! 10k mở hàng lấy hên!"; break;
        case "20k": msg="🔥 20k nè! Hên hơn chút rồi đó!"; break;
        case "50k": msg="💰 50k! Trộm vía trộm vía!"; break;
        case "100k": msg="👑 100k! Gia chủ bật chế độ đại gia!"; break;
        case "Lì xì lại gia chủ": msg="🤣 Ủa alo? Lì xì ngược lại gia chủ rồi!"; break;
        default: msg="🎊 "+prize+"! Chúc cả năm may mắn!";
    }

    document.getElementById("result").innerText=msg;
}

function reset(){
    resetCount++;

    if(resetCount>=5){
        force100k=true;
    }
}

</script>

</body>
</html>
