<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vòng Quay Lì Xì</title>
<style>
body{
    margin:0;
    background:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:sans-serif;
    color:white;
}

#wheel{
    border-radius:50%;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#ff4757;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

.pointer{
    position:absolute;
    top:50%;
    transform:translateY(-200px);
    font-size:30px;
}
</style>
</head>
<body>

<div class="pointer">🔻</div>
<canvas id="wheel" width="300" height="300"></canvas>
<button onclick="spin()">Quay ngay 🎯</button>
<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = [
"10k","20k","10k","10k","20k","10k",
"50k",
"10k","20k","10k","20k","10k"
];

const colors = ["#ff6b81","#ffa502","#70a1ff","#2ed573"];

const total = segments.length;
const arc = 2 * Math.PI / total;

let angle = 0;
let spinning = false;

function drawWheel(){
    for(let i=0;i<total;i++){
        const start = i * arc + angle;
        ctx.beginPath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.moveTo(150,150);
        ctx.arc(150,150,150,start,start+arc);
        ctx.fill();

        ctx.save();
        ctx.translate(150,150);
        ctx.rotate(start + arc/2);
        ctx.fillStyle="white";
        ctx.font="16px Arial";
        ctx.fillText(segments[i],60,5);
        ctx.restore();
    }
}

function spin(){
    if(spinning) return;
    spinning=true;

    const spinAngle = Math.random()*2000 + 3000;
    const duration = 3000;
    const start = performance.now();

    function animate(now){
        const elapsed = now - start;
        const progress = elapsed / duration;

        if(progress < 1){
            angle = spinAngle * (1 - easeOut(progress));
            ctx.clearRect(0,0,300,300);
            drawWheel();
            requestAnimationFrame(animate);
        } else {
            spinning=false;
            const index = Math.floor((total - (angle % (2*Math.PI)) / arc) % total);
            document.getElementById("result").innerText =
                "🎉 Bạn trúng: " + segments[index];
        }
    }
    requestAnimationFrame(animate);
}

function easeOut(t){
    return 1 - Math.pow(1 - t, 3);
}

drawWheel();
</script>

</body>
</html>
