<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vòng Quay Lì Xì 2026</title>
<style>
body{
    margin:0;
    background:radial-gradient(circle,#fff4d6,#ffcccc);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:sans-serif;
}

h2{
    margin-bottom:10px;
}

.wheel-wrapper{
    position:relative;
}

.pointer{
    position:absolute;
    top:-25px;              /* hạ xuống gần vòng hơn */
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-top:50px solid #d40000;  /* đổi sang border-top để mũi tên chĩa xuống */
    z-index:10;
}

canvas{
    border-radius:50%;
    box-shadow:0 0 40px rgba(0,0,0,0.3);
}

button{
    margin-top:15px;
    padding:10px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#spinBtn{
    background:#d40000;
    color:white;
}

#resetBtn{
    background:#555;
    color:white;
}

.flash{
    animation:blink 0.3s alternate 4;
}
@keyframes blink{
    from{background:#d40000;}
    to{background:gold;}
}

#result{
    margin-top:15px;
    font-weight:bold;
    font-size:18px;
    min-height:40px;
}
</style>
</head>
<body>

<h2>🧧 Vòng Quay Lì Xì 2026 🧧</h2>

<div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheel" width="420" height="420"></canvas>
</div>

<button id="spinBtn" onclick="spin()">Quay Ngay 🎉</button>
<button id="resetBtn" onclick="resetGame()">Reset 🔁</button>

<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");

const segments = [
"200K 💎",
"50K 🔥",
"10K 💵",
"20K 🧧",
"Lì xì lại gia chủ 🎆",
"10K 💵",
"100K 👑",
"20K 🧧",
"10K 💵",
"50K 🔥",
"Chúc mừng năm mới 🎊",
"An khang thịnh vượng 🌸"
];

const colors = {
"200K 💎":"#5e2ca5",
"100K 👑":"#d4af37",
"50K 🔥":"#ff5722",
"20K 🧧":"#e53935",
"10K 💵":"#ff9800",
"Lì xì lại gia chủ 🎆":"#c2185b",
"Chúc mừng năm mới 🎊":"#c2185b",
"An khang thịnh vượng 🌸":"#c2185b"
};

const total = segments.length;
const arc = 2*Math.PI/total;

let currentAngle=0;
let spinning=false;
let resetCount=0;
let force100k=false;
let forceGiaChu=false;
let resetTimer=null;

function drawWheel(){
    for(let i=0;i<total;i++){
        const start=i*arc+currentAngle;
        ctx.beginPath();
        ctx.moveTo(210,210);
        ctx.arc(210,210,210,start,start+arc);
        ctx.fillStyle=colors[segments[i]];
        ctx.fill();

        ctx.save();
        ctx.translate(210,210);
        ctx.rotate(start+arc/2);
        ctx.fillStyle="white";
        ctx.font="bold 14px Arial";
        ctx.textAlign="right";
        ctx.fillText(segments[i],180,5);
        ctx.restore();
    }
}

function easeOut(t){
    return 1-Math.pow(1-t,3);
}

function getResult(){

    if(force100k){
        force100k=false;
        return "100K 👑";
    }

    if(forceGiaChu){
        forceGiaChu=false;
        return "Lì xì lại gia chủ 🎆";
    }

    let r=Math.random()*100;

    if(r<65) return "10K 💵";
    if(r<85) return "20K 🧧";
    if(r<90) return "50K 🔥";
    if(r<95) return "Lì xì lại gia chủ 🎆";
    return "Chúc mừng năm mới 🎊";
}

function spin(){
    if(spinning) return;
    spinning=true;

    const prize=getResult();
    const index=segments.indexOf(prize);

    const target=(Math.PI*3/2)-(index*arc+arc/2);
    const final=6*2*Math.PI+target;
    const duration=4500;
    const start=performance.now();

    function animate(now){
        const progress=Math.min((now-start)/duration,1);
        currentAngle=final*easeOut(progress);
        ctx.clearRect(0,0,420,420);
        drawWheel();

        if(progress<1){
            requestAnimationFrame(animate);
        }else{
            spinning=false;
            showResult(prize);
        }
    }
    requestAnimationFrame(animate);
}

function showResult(prize){
    if(prize.includes("10K"))
        result.innerText="😆 10K mở hàng lấy hên!";
    else if(prize.includes("20K"))
        result.innerText="🔥 20K! Hên hơn chút rồi!";
    else if(prize.includes("50K"))
        result.innerText="💰 50K! Cũng căng đó!";
    else if(prize.includes("100K"))
        result.innerText="👑 100K!!! Đại gia xuất hiện!";
    else if(prize.includes("gia chủ"))
        result.innerText="🤣 Lì xì lại gia chủ nha!";
    else
        result.innerText="🎊 "+prize;
}

function resetGame(){
    resetCount++;
    if(resetTimer) clearTimeout(resetTimer);
    resetTimer=setTimeout(()=>{resetCount=0;},3000);

    if(resetCount===5){
        force100k=true;
        resetCount=0;
        spinBtn.classList.add("flash");
        setTimeout(()=>spinBtn.classList.remove("flash"),1000);
    }
    else if(resetCount===3){
        forceGiaChu=true;
        spinBtn.classList.add("flash");
        setTimeout(()=>spinBtn.classList.remove("flash"),1000);
    }
}

drawWheel();
</script>

</body>
</html>
