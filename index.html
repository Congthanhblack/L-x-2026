<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vòng Quay Lì Xì 2026 🎉</title>
<style>
body{
    margin:0;
    background:radial-gradient(circle,#1a0000,#000);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:sans-serif;
    color:white;
}

.wheel-container{
    position:relative;
}

.pointer{
    position:absolute;
    top:-35px;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
    color:gold;
    text-shadow:0 0 15px rgba(255,215,0,0.8);
    z-index:10;
}

canvas{
    border-radius:50%;
    box-shadow:0 0 50px rgba(255,0,0,0.5);
}

button{
    margin-top:15px;
    padding:14px 35px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff0000,#ff4757);
    color:white;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    min-height:60px;
}

.admin{
    background:#444;
    font-size:14px;
}
</style>
</head>
<body>

<div class="wheel-container">
    <div class="pointer">▼</div>
    <canvas id="wheel" width="380" height="380"></canvas>
</div>

<button onclick="spin()">Quay Lì Xì 🎆</button>
<button class="admin" onclick="resetGame()">Reset</button>

<div id="result">Sẵn sàng đón lộc đầu năm ✨</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = [
"200K 💎",
"50K 🔥",
"10K 💵",
"20K 🧧",
"Chúc Lì Xì Lại Gia Chủ 🎆",
"10K 💵",
"100K 💰",
"20K 🧧",
"10K 💵",
"50K 🔥",
"Lộc Xuân Đầy Nhà 🎊",
"Vạn Sự Như Ý 🌸"
];

const colorMap = {
"200K 💎":"#6a0dad",
"100K 💰":"#d4af37",
"50K 🔥":"#ff4500",
"20K 🧧":"#2ed573",
"10K 💵":"#1e90ff",
"Chúc Lì Xì Lại Gia Chủ 🎆":"#ff6b81",
"Lộc Xuân Đầy Nhà 🎊":"#ff6b81",
"Vạn Sự Như Ý 🌸":"#ff6b81"
};

const total = segments.length;
const arc = 2 * Math.PI / total;

let currentAngle = 0;
let spinning = false;
let forceGiaChu = false;
let resetCount = 0;
let resetTimer = null;

function drawWheel(){
    for(let i=0;i<total;i++){
        const start = i * arc + currentAngle;
        ctx.beginPath();
        ctx.fillStyle = colorMap[segments[i]];
        ctx.moveTo(190,190);
        ctx.arc(190,190,190,start,start+arc);
        ctx.fill();

        ctx.save();
        ctx.translate(190,190);
        ctx.rotate(start + arc/2);
        ctx.fillStyle="white";
        ctx.font="bold 14px Arial";
        ctx.textAlign="right";
        ctx.fillText(segments[i],165,5);
        ctx.restore();
    }
}

function easeOutCubic(t){
    return 1 - Math.pow(1 - t, 3);
}

function getControlledResult(){

    if(forceGiaChu){
        forceGiaChu = false;
        return "Chúc Lì Xì Lại Gia Chủ 🎆";
    }

    let r = Math.random()*100;

    if(r < 5) return "50K 🔥";
    if(r < 20) return "20K 🧧";
    if(r < 90) return "10K 💵";
    if(r < 95) return "100K 💰";
    return "Lộc Xuân Đầy Nhà 🎊";
}

function spin(){
    if(spinning) return;
    spinning = true;

    const resultText = getControlledResult();
    const winningIndex = segments.findIndex(s => s === resultText);

    const targetAngle =
        (Math.PI * 3/2) - (winningIndex * arc + arc/2);

    const extraSpins = 6 * 2 * Math.PI;
    const finalAngle = extraSpins + targetAngle;

    const duration = 4200;
    const start = performance.now();

    function animate(now){
        const elapsed = now - start;
        const progress = Math.min(elapsed/duration,1);
        currentAngle = finalAngle * easeOutCubic(progress);

        ctx.clearRect(0,0,380,380);
        drawWheel();

        if(progress < 1){
            requestAnimationFrame(animate);
        } else {
            spinning = false;
            document.getElementById("result").innerText =
            "🎉 Kết quả: " + resultText;
        }
    }
    requestAnimationFrame(animate);
}

function resetGame(){
    resetCount++;

    if(resetTimer) clearTimeout(resetTimer);

    resetTimer = setTimeout(()=>{
        resetCount = 0;
    },3000);

    if(resetCount === 3){
        forceGiaChu = true;
        resetCount = 0;
    }
}

drawWheel();
</script>

</body>
</html>
