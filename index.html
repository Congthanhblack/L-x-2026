<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vòng Quay Lì Xì 2026 😈</title>
<style>
body{
    margin:0;
    background:radial-gradient(circle,#2b0000,#000);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:sans-serif;
    color:white;
}

/* Container để căn giữa */
.wheel-container{
    position:relative;
}

/* Kim mới */
.pointer{
    position:absolute;
    top:-35px;               /* Lùi ra ngoài vòng */
    left:50%;
    transform:translateX(-50%);
    font-size:60px;          /* To hơn */
    color:gold;
    text-shadow:0 0 15px rgba(255,215,0,0.8);
    z-index:10;
}

canvas{
    border-radius:50%;
    box-shadow:0 0 40px rgba(255,0,0,0.4);
}

button{
    margin-top:15px;
    padding:12px 30px;
    font-size:16px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff0000,#ff4757);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    min-height:60px;
}

.admin{
    background:#444;
    font-size:14px;
}
</style>
</head>
<body>

<div class="wheel-container">
    <div class="pointer">▼</div>
    <canvas id="wheel" width="360" height="360"></canvas>
</div>

<button id="spinBtn" onclick="spin()">Quay nữa đi 😈</button>
<button class="admin" onclick="resetGame()">Reset</button>

<div id="result">200K đang nhìn bạn đó 👀</div>

<script>
// --- PHẦN JS GIỮ NGUYÊN LOGIC CŨ ---

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");

const segments = [
"200K 💎","50K 🔥","10K","20K","Lì xì lại 🧧",
"10K","100K 💰","10K","50K 🔥","10K",
"200K 💎","10K","100K 💰","10K","50K 🔥","100K 💰"
];

const colors = ["#ff0000","#ff6b81","#ffa502","#2ed573","#70a1ff"];
const total = segments.length;
const arc = 2 * Math.PI / total;

let currentAngle = 0;
let spinning = false;
let force100k = false;
let resetCount = 0;
let resetTimer = null;

function drawWheel(){
    for(let i=0;i<total;i++){
        const start = i * arc + currentAngle;
        ctx.beginPath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.moveTo(180,180);
        ctx.arc(180,180,180,start,start+arc);
        ctx.fill();

        ctx.save();
        ctx.translate(180,180);
        ctx.rotate(start + arc/2);
        ctx.fillStyle="white";
        ctx.font="bold 14px Arial";
        ctx.fillText(segments[i],85,5);
        ctx.restore();
    }
}

function easeOutCubic(t){
    return 1 - Math.pow(1 - t, 3);
}

function getControlledResult(){
    if(force100k){
        force100k = false;
        return "100K 💰";
    }
    let r = Math.random()*100;
    if(r < 5) return "50K 🔥";
    if(r < 25) return "20K";
    if(r < 90) return "10K";
    return "Lì xì lại 🧧";
}

function spin(){
    if(spinning) return;
    spinning = true;

    const resultText = getControlledResult();
    const winningIndex = segments.findIndex(s => s === resultText);

    const targetAngle =
        (Math.PI * 3/2) - (winningIndex * arc + arc/2);

    const extraSpins = 8 * 2 * Math.PI;
    const finalAngle = extraSpins + targetAngle;

    const duration = 4500;
    const start = performance.now();

    function animate(now){
        const elapsed = now - start;
        const progress = Math.min(elapsed/duration,1);
        currentAngle = finalAngle * easeOutCubic(progress);

        ctx.clearRect(0,0,360,360);
        drawWheel();

        if(progress < 1){
            requestAnimationFrame(animate);
        } else {
            spinning = false;
            document.getElementById("result").innerText =
            "🎆 Kết quả: " + resultText;
        }
    }
    requestAnimationFrame(animate);
}

function resetGame(){
    resetCount++;
    if(resetTimer) clearTimeout(resetTimer);
    resetTimer = setTimeout(()=>{ resetCount=0; },3000);

    if(resetCount===5){
        force100k=true;
        resetCount=0;
        spinBtn.style.background="gold";
        setTimeout(()=>{ spinBtn.style.background=""; },2000);
    }
}

drawWheel();
</script>
</body>
</html>
